        <!-- SLIDE 2: What is OpenClaw? -->

            <h2>🤖 What is OpenClaw?</h2>
            
            <p>OpenClaw is an open-source AI agent platform that runs locally on your machine. Think of it as your own personal AI assistant that you control completely.</p>
            
            <div class="card">
                <h3>Key Features</h3>
                <ul>
                    <li><strong>Local-first:</strong> Runs on your hardware, not in the cloud</li>
                    <li><strong>Private:</strong> Your data stays on your machine</li>
                    <li><strong>Extensible:</strong> Add capabilities via Skills</li>
                    <li><strong>Multi-provider:</strong> Works with OpenAI, Anthropic, local LLMs</li>
                    <li><strong>Free:</strong> Open source, no subscriptions</li>
                </ul>
            </div>
            
            <div class="quote">
                "Skills extend OpenClaw's capabilities, allowing it to interact with external tools, APIs, and services."
            </div>
        </section>

├── SKILL.md          ← How to use the skill
├── README.md         ← What the skill does  
├── package.json      ← Metadata and dependencies
├── src/
│   ├── index.js      ← Main entry point
│   └── tools.js      ← Tool implementations
└── .env.example      ← Required environment variables</code></pre>

            <p>This file is critical. It tells the AI <strong>when</strong> to use your skill and <strong>how</strong> to use it.</p>
            
            <pre><code># My Weather Skill

## Description
Get current weather and forecasts for any location.

## When to Use
- User asks about weather
- User mentions travel plans
- User asks what to wear

## Tools

### get_current_weather
Get current weather conditions.

Parameters:
- location (string, required): City name or coordinates
- units (string, optional): "celsius" or "fahrenheit"

Example:
```
get_current_weather({"location": "Sydney", "units": "celsius"})
```

## Output Format
Always respond with:
- Current temperature
- Conditions (sunny, rainy, etc.)
- High/Low for the day</code></pre>
            
            <div class="highlight">
                <p><strong>Key insight:</strong> The "When to Use" section is crucial. It helps the AI decide which skill to call for each user request. Be specific!</p>

        <!-- SLIDE 9: Tool Implementation -->
        <section class="slide">
            <h2>⚙️ Writing Tool Code</h2>
            
            <p>Tools are JavaScript functions that do the actual work. They receive parameters from the AI and return results.</p>
            
            <pre><code>// src/tools.js
const axios = require('axios');

async function get_current_weather({ location, units = 'celsius' }) {
  const apiKey = process.env.WEATHER_API_KEY;
  
  const response = await axios.get(
    `https://api.weather.com/current?location=${location}`,
    { headers: { 'Authorization': apiKey } }
  );
  
  return {
    temperature: response.data.temp,
    condition: response.data.condition,
    high: response.data.high,
    low: response.data.low
  };
}

module.exports = {
  get_current_weather
};</code></pre>
            
            <div class="card">
                <h3>Best Practices</h3>
                <ul>
                    <li>Always validate input parameters</li>
                    <li>Use environment variables for API keys</li>
                    <li>Return consistent data structures</li>
                    <li>Handle errors gracefully</li>
                    <li>Add logging for debugging</li>
                </ul>
            </div>
        </section>

        <!-- SLIDE 10: Environment Variables -->

            <p>Never hardcode API keys. Use environment variables instead.</p>

WEATHER_API_KEY=your_api_key_here
DATABASE_URL=your_db_url_here</code></pre>
            
            <pre><code># .env (NOT committed, added to .gitignore)
WEATHER_API_KEY=sk-abc123xyz789</code></pre>
            
            <pre><code># In your tool code
const apiKey = process.env.WEATHER_API_KEY;

if (!apiKey) {
  throw new Error('WEATHER_API_KEY not set');
}</code></pre>
            
            <div class="highlight">
                <p><strong>Security Note:</strong> OpenClaw loads .env files automatically. Users configure their own keys after installing your skill.</p>
